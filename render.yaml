# Render Blueprint — PRISM Dashboard
services:
  # Backend API
  - type: web
    name: prism-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALPACA_KEY
        sync: false
      - key: ALPACA_SECRET
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets/v2
      - key: POLYGON_API_KEY
        sync: false
      - key: PRISM_DATA_DIR
        value: /opt/render/project/src/data
      - key: DATABASE_URL
        sync: false
    plan: free

  # Frontend (Static Site)
  - type: web
    name: prism-dashboard
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://prism-api-nlv5.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
